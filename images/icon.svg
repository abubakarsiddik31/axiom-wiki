<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-wiki" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E293B"/> <!-- Deep Slate -->
      <stop offset="100%" stop-color="#3B82F6"/> <!-- Reference Blue -->
    </linearGradient>
    <filter id="glow-wiki" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur"/>
      <feOffset dx="0" dy="8" result="offsetBlur"/>
      <feFlood flood-color="#3B82F6" flood-opacity="0.2" result="offsetColor"/>
      <feComposite in="offsetColor" in2="offsetBlur" operator="in" result="glowBlend"/>
      <feMerge>
        <feMergeNode in="glowBlend"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Modern Squircle Background -->
  <rect x="40" y="40" width="432" height="432" rx="100" fill="url(#grad-wiki)" filter="url(#glow-wiki)"/>
  
  <!-- The "A-Book" Structure -->
  <!-- Left Page (Leg of A) -->
  <path d="M256 120 L130 400 H190 L256 240 Z" fill="white" fill-opacity="1.0" />
  <!-- Right Page (Leg of A) -->
  <path d="M256 120 L382 400 H322 L256 240 Z" fill="white" fill-opacity="0.8" />
  
  <!-- The "Wiki Crossbar" (Interconnected Knowledge) -->
  <path d="M190 300 L256 240 L322 300" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M190 300 H322" stroke="white" stroke-width="4" stroke-opacity="0.6" stroke-dasharray="8 8"/>

  <!-- Network Nodes (Pages/Entities) -->
  <circle cx="256" cy="120" r="18" fill="white" /> <!-- Root Concept -->
  <circle cx="190" cy="300" r="12" fill="white" /> <!-- Entity A -->
  <circle cx="322" cy="300" r="12" fill="white" /> <!-- Entity B -->
  <circle cx="256" cy="240" r="10" fill="white" /> <!-- Connection Hub -->
  
  <!-- Glowing "Data Flow" Lines -->
  <path d="M256 120 V240" stroke="white" stroke-width="2" stroke-opacity="0.4" />
  <path d="M256 60 V120" stroke="white" stroke-width="4" stroke-linecap="round" stroke-opacity="0.8"/>
  <circle cx="256" cy="65" r="6" fill="white" />
</svg>
